{% extends 'core/base.html' %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<div class="container">
    <h1 style="font-size: 28px; font-weight: 600; margin-bottom: 8px;">Welcome, {{ customer.firm_name }}</h1>
    <p style="color: #555; margin-bottom: 32px;">What would you like to do today?</p>
    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; max-width: 500px;">
        <a href="/clients/" style="background: white; border: 1px solid #eee; border-radius: 12px; padding: 24px; text-decoration: none; color: #1a1a1a;">
            <div style="font-size: 24px; margin-bottom: 8px;">👥</div>
            <div style="font-weight: 500;">Clients</div>
            <div style="font-size: 13px; color: #888;">Manage your clients</div>
        </a>
        <a href="/invoices/" style="background: white; border: 1px solid #eee; border-radius: 12px; padding: 24px; text-decoration: none; color: #1a1a1a;">
            <div style="font-size: 24px; margin-bottom: 8px;">📄</div>
            <div style="font-weight: 500;">Invoices</div>
            <div style="font-size: 13px; color: #888;">Coming soon</div>
        </a>
        <a href="/appointments/" style="background: white; border: 1px solid #eee; border-radius: 12px; padding: 24px; text-decoration: none; color: #1a1a1a;">
            <div style="font-size: 24px; margin-bottom: 8px;">📅</div>
            <div style="font-weight: 500;">Appointments</div>
            <div style="font-size: 13px; color: #888;">Coming soon</div>
        </a>
        <a href="/documents/" style="background: white; border: 1px solid #eee; border-radius: 12px; padding: 24px; text-decoration: none; color: #1a1a1a;">
            <div style="font-size: 24px; margin-bottom: 8px;">📁</div>
            <div style="font-weight: 500;">Documents</div>
            <div style="font-size: 13px; color: #888;">Coming soon</div>
        </a>
    </div>
    <br>
    <a href="/logout/" style="font-size: 14px; color: #888;">Log out</a>
</div>
{% endblock %}
