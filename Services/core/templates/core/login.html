{% extends 'core/base.html' %} {% block title %}Login{% endblock %} {% block content %}
<div class="container" style="max-width: 420px;">
    <h2 style="font-size: 24px; font-weight: 600; margin-bottom: 8px;">Welcome back</h2>
    <p style="color: #555; margin-bottom: 32px; font-size: 14px;">Enter your activation key to continue.</p>
    <form method="post">
        {% csrf_token %}
        <input type="text" name="organization" placeholder="Organization name" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 12px;">
        <input type="text" name="activation_key" placeholder="Activation key" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 12px;">
        <button type="submit" style="width: 100%; padding: 12px; background: #1a1a1a; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer;">Login</button>
    </form>
    {% if error %}
    <p style="color: red; margin-top: 16px; font-size: 14px;">{{ error }}</p>
    {% endif %}
</div>
{% endblock %}
