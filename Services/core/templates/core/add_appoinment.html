{% extends 'core/base.html' %} {% block title %}New Appointment{% endblock %} {% block content %}
<div class="container" style="max-width: 520px;">
    <h2 style="font-size: 24px; font-weight: 600; margin-bottom: 32px;">New Appointment</h2>
    {% if error %}
    <p style="color: red; font-size: 14px; margin-bottom: 16px;">{{ error }}</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <input type="text" name="title" placeholder="Title e.g. Haircut, Consultation" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 12px;">
        <select name="client" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 12px;">
            <option value="">— No client —</option>
            {% for client in clients %}
            <option value="{{ client.id }}">{{ client.name }}</option>
            {% endfor %}
        </select>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
            <input type="date" name="date" required style="padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px;">
            <input type="time" name="time" required style="padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px;">
        </div>
        <textarea name="notes" placeholder="Notes (optional)" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; height: 80px; margin-bottom: 12px;"></textarea>
        <button type="submit" style="width: 100%; padding: 12px; background: #1a1a1a; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer;">Schedule Appointment</button>
    </form>
</div>
{% endblock %}
