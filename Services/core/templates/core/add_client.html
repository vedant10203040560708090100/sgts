{% extends 'core/base.html' %}
{% block title %}Add Client{% endblock %}
{% block content %}
<div class="container" style="max-width: 520px;">
    <h2 style="font-size: 24px; font-weight: 600; margin-bottom: 32px;">Add Client</h2>
    <form method="post">
        {% csrf_token %}
        <input type="text" name="name" placeholder="Full name" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 12px;">
        <input type="email" name="email" placeholder="Email" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 12px;">
        <input type="text" name="phone" placeholder="Phone" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 12px;">
        <input type="text" name="address" placeholder="Address" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 12px;">
        <textarea name="notes" placeholder="Notes" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 12px; height: 100px;"></textarea>
        <button type="submit" style="width: 100%; padding: 12px; background: #1a1a1a; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer;">Save Client</button>
    </form>
</div>
{% endblock %}
